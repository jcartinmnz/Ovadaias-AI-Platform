kind = "web"
previewPath = "/"
title = "Ovadaias — Agente IA Corporativo"
version = "1.0.0"
id = "artifacts/ovadaias"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25903

[services.development]
run = "pnpm --filter @workspace/ovadaias run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ovadaias", "run", "build" ]
publicDir = "artifacts/ovadaias/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25903"
BASE_PATH = "/"
VITE_DEV_AUTH_BYPASS = "true"
